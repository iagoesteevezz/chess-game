<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ajedrez</title>
  </head>
  <body>
    <button id="exit-fs" class="exit-fs" title="Salir de pantalla completa">✕ Salir</button>
    <main id="app">
      <section class="board-area">
        <div class="captured-bar">
          <span id="captured-top" class="captured"></span>
          <span id="clock-top" class="clock" data-side="top"></span>
        </div>
        <div class="board-wrap">
          <div id="board" class="board"></div>
          <div id="promo" class="promo"></div>
        </div>
        <div class="captured-bar">
          <span id="captured-bottom" class="captured"></span>
          <span id="clock-bottom" class="clock" data-side="bottom"></span>
        </div>

        <!-- Barra de evaluación: quién va mejor -->
        <div class="eval">
          <div class="eval-track">
            <div id="eval-fill" class="eval-fill"></div>
            <span id="eval-label" class="eval-label">+0.0</span>
          </div>
          <span class="eval-ends"><b>♔</b><b>♚</b></span>
        </div>
      </section>

      <aside class="panel">
        <h1>♟ Ajedrez</h1>

        <div class="status">
          <p>Turno: <span id="turn">Blancas</span></p>
          <p>Estado: <span id="game-state">En juego</span></p>
          <p class="opening" id="opening"></p>
        </div>

        <div class="controls">
          <button id="undo" title="Deshacer (U)">↶</button>
          <button id="redo" title="Rehacer (R)">↷</button>
          <button id="flip" title="Girar tablero (F)">⇅</button>
          <button id="sound" title="Sonido">🔊</button>
          <button id="fullscreen" title="Pantalla completa">⛶</button>
        </div>

        <div class="toggles">
          <label><input type="checkbox" id="arrows" /> Flechas de jugada</label>
          <label class="theme-row">Tema
            <select id="theme">
              <option>Verde</option>
              <option>Madera</option>
              <option>Azul</option>
              <option>Mármol</option>
              <option>Coral</option>
              <option>Noche</option>
            </select>
          </label>
        </div>

        <div class="export">
          <button id="hint">💡 Mejor jugada</button>
          <button id="analyze">Analizar</button>
        </div>
        <p id="analysis" class="analysis"></p>

        <div class="setup">
          <label><input type="checkbox" id="vs-ai" /> Jugar contra la IA</label>
          <label>Dificultad
            <select id="depth">
              <option value="1">Fácil</option>
              <option value="2">Media</option>
              <option value="3" selected>Difícil</option>
            </select>
          </label>
          <label>Reloj
            <select id="clock">
              <option value="0" selected>Sin reloj</option>
              <option value="1">1 min</option>
              <option value="3">3 min</option>
              <option value="5">5 min</option>
              <option value="10">10 min</option>
            </select>
          </label>
          <button id="new-game" class="primary">Nueva partida</button>
        </div>

        <div class="export">
          <button id="copy-fen">Copiar FEN</button>
          <button id="copy-pgn">Copiar PGN</button>
        </div>
        <div class="export">
          <button id="save-game">Guardar</button>
          <button id="load-game">Cargar</button>
          <button id="import-game">Importar</button>
        </div>

        <div class="online">
          <h2>Jugar online</h2>
          <div class="export">
            <button id="host">Crear sala</button>
            <button id="join">Unirse</button>
          </div>
          <p id="online-status" class="analysis"></p>
        </div>

        <div class="history">
          <h2>Historial</h2>
          <ol id="moves"></ol>
        </div>
      </aside>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
